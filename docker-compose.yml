version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: supplysync-db
    environment:
      POSTGRES_DB: supplysync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: supplysync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supplysync
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: CHANGE_ME
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: supplysync-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
